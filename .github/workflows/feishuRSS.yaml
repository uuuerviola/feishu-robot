name: "feishu info"
on:
  schedule:
    - cron: "*/34 * * * *"
  push:
    branches:
      - master
  workflow_dispatch: 

jobs:
  RSS_Process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: 安装依赖
        run: yarn install
      - name: 执行RSS程序
        run: |
          # 1. 强制发送一条测试消息，验证 Webhook 是否打通
          curl -X POST -H "Content-Type: application/json" \
          -d '{"msg_type":"text","content":{"text":"GitHub Actions 通道测试：正在尝试抓取资讯..."}}' \
          ${{ secrets.FEISHU_WEBHOOK }}
          
          # 2. 执行真正的抓取脚本
          yarn rss
        env:
          SEED_URL: ${{ secrets.RSS_URL }}
          WEB_HOOK: ${{ secrets.FEISHU_WEBHOOK }}
          APP_ID: ${{ secrets.APP_ID }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
      - name: commit code
        run: |
          git config --local user.email "robot@robot.kasong.com"
          git config --local user.name "feishu-robot-github-actions"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "定时执行 $(date)" && echo "HAS_CHANGES=true" >> $GITHUB_ENV)
      - name: push code
        if: env.HAS_CHANGES == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          force: true
